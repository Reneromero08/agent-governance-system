name: Contracts

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: contracts-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  governance:
    name: Governance Checks
    runs-on: ubuntu-latest
    env:
      AGS_PUSH_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
      AGS_PUSH_FORCED: ${{ github.event_name == 'push' && github.event.forced && 'true' || 'false' }}
      TMPDIR: ${{ github.workspace }}/LAW/CONTRACTS/_runs/_tmp/pytest
      TEMP: ${{ github.workspace }}/LAW/CONTRACTS/_runs/_tmp/pytest
      TMP: ${{ github.workspace }}/LAW/CONTRACTS/_runs/_tmp/pytest
      CUDA_VISIBLE_DEVICES: ""
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install base dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-xdist cryptography referencing scipy

      - name: Test query module (pre-build gate)
        run: python NAVIGATION/CORTEX/tests/test_query.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run canon governance checks
        run: node CAPABILITY/TOOLS/check-canon-governance.js

      - name: Run critic checks
        run: python CAPABILITY/TOOLS/governance/critic.py

      - name: Lint tokens
        run: python CAPABILITY/TOOLS/utilities/lint_tokens.py

      - name: MCP governance smoke test
        run: python CAPABILITY/MCP/verify_governance.py

      - name: Run contract fixtures
        env:
          CI: "true"
        run: python LAW/CONTRACTS/runner.py

      - name: Build canonical push test plan
        id: push_plan
        run: |
          mkdir -p "$TMPDIR"
          PLAN_PATH="$RUNNER_TEMP/push-plan.json"
          python CAPABILITY/TOOLS/utilities/push_test_plan.py --json --workers 4 > "$PLAN_PATH"
          python - "$PLAN_PATH" <<'PY'
          import json
          import os
          import sys

          plan_path = sys.argv[1]
          with open(plan_path, encoding="utf-8") as handle:
              payload = json.load(handle)
          names = {suite["name"] for suite in payload["suites"]}
          outputs = {
              "plan_path": plan_path,
              "plan_hash": payload["plan_hash"],
              "write_firewall": str("write-firewall" in names).lower(),
              "symbol_resolution": str("symbol-resolution" in names).lower(),
              "mcp_capability": str("mcp-capability" in names).lower(),
              "skill_discovery": str("skill-discovery" in names).lower(),
              "cassette_network": str("cassette-network" in names).lower(),
              "embeddings": str("embeddings" in names).lower(),
              "semantic": str(bool(names & {"skill-discovery", "cassette-network", "embeddings"})).lower(),
          }
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              for key, value in outputs.items():
                  handle.write(f"{key}={value}\n")
          print(
              "[push-plan] "
              f"hash={payload['plan_hash'][:12]} "
              f"groups={','.join(item['name'] for item in payload['risk_groups']) or 'none'} "
              f"suites={','.join(sorted(names))}"
          )
          PY

      - name: Install semantic test dependencies
        if: steps.push_plan.outputs.semantic == 'true'
        run: python -m pip install sentence-transformers

      - name: Run core push suite
        id: suite_core
        continue-on-error: true
        run: |
          set -o pipefail
          python CAPABILITY/TOOLS/utilities/run_planned_suite.py \
            --plan "${{ steps.push_plan.outputs.plan_path }}" \
            --suite core 2>&1 | tee "$RUNNER_TEMP/push-suite-core.log"

      - name: Run write-firewall push suite
        id: suite_write_firewall
        if: always() && steps.push_plan.outputs.write_firewall == 'true'
        continue-on-error: true
        run: |
          set -o pipefail
          python CAPABILITY/TOOLS/utilities/run_planned_suite.py \
            --plan "${{ steps.push_plan.outputs.plan_path }}" \
            --suite write-firewall 2>&1 | tee "$RUNNER_TEMP/push-suite-write-firewall.log"

      - name: Run symbol-resolution push suite
        id: suite_symbol_resolution
        if: always() && steps.push_plan.outputs.symbol_resolution == 'true'
        continue-on-error: true
        run: |
          set -o pipefail
          python CAPABILITY/TOOLS/utilities/run_planned_suite.py \
            --plan "${{ steps.push_plan.outputs.plan_path }}" \
            --suite symbol-resolution 2>&1 | tee "$RUNNER_TEMP/push-suite-symbol-resolution.log"

      - name: Run MCP capability push suite
        id: suite_mcp_capability
        if: always() && steps.push_plan.outputs.mcp_capability == 'true'
        continue-on-error: true
        run: |
          set -o pipefail
          python CAPABILITY/TOOLS/utilities/run_planned_suite.py \
            --plan "${{ steps.push_plan.outputs.plan_path }}" \
            --suite mcp-capability 2>&1 | tee "$RUNNER_TEMP/push-suite-mcp-capability.log"

      - name: Run skill-discovery push suite
        id: suite_skill_discovery
        if: always() && steps.push_plan.outputs.skill_discovery == 'true'
        continue-on-error: true
        run: |
          set -o pipefail
          python CAPABILITY/TOOLS/utilities/run_planned_suite.py \
            --plan "${{ steps.push_plan.outputs.plan_path }}" \
            --suite skill-discovery 2>&1 | tee "$RUNNER_TEMP/push-suite-skill-discovery.log"

      - name: Run cassette-network push suite
        id: suite_cassette_network
        if: always() && steps.push_plan.outputs.cassette_network == 'true'
        continue-on-error: true
        run: |
          set -o pipefail
          python CAPABILITY/TOOLS/utilities/run_planned_suite.py \
            --plan "${{ steps.push_plan.outputs.plan_path }}" \
            --suite cassette-network 2>&1 | tee "$RUNNER_TEMP/push-suite-cassette-network.log"

      - name: Run embedding push suite
        id: suite_embeddings
        if: always() && steps.push_plan.outputs.embeddings == 'true'
        continue-on-error: true
        run: |
          set -o pipefail
          python CAPABILITY/TOOLS/utilities/run_planned_suite.py \
            --plan "${{ steps.push_plan.outputs.plan_path }}" \
            --suite embeddings 2>&1 | tee "$RUNNER_TEMP/push-suite-embeddings.log"

      - name: Upload push-suite logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: push-suite-logs-${{ github.run_id }}
          path: ${{ runner.temp }}/push-suite-*.log
          if-no-files-found: warn
          retention-days: 7

      - name: Enforce selected suite results
        if: always()
        env:
          CORE_OUTCOME: ${{ steps.suite_core.outcome }}
          WRITE_FIREWALL_SELECTED: ${{ steps.push_plan.outputs.write_firewall }}
          WRITE_FIREWALL_OUTCOME: ${{ steps.suite_write_firewall.outcome }}
          SYMBOL_RESOLUTION_SELECTED: ${{ steps.push_plan.outputs.symbol_resolution }}
          SYMBOL_RESOLUTION_OUTCOME: ${{ steps.suite_symbol_resolution.outcome }}
          MCP_CAPABILITY_SELECTED: ${{ steps.push_plan.outputs.mcp_capability }}
          MCP_CAPABILITY_OUTCOME: ${{ steps.suite_mcp_capability.outcome }}
          SKILL_DISCOVERY_SELECTED: ${{ steps.push_plan.outputs.skill_discovery }}
          SKILL_DISCOVERY_OUTCOME: ${{ steps.suite_skill_discovery.outcome }}
          CASSETTE_NETWORK_SELECTED: ${{ steps.push_plan.outputs.cassette_network }}
          CASSETTE_NETWORK_OUTCOME: ${{ steps.suite_cassette_network.outcome }}
          EMBEDDINGS_SELECTED: ${{ steps.push_plan.outputs.embeddings }}
          EMBEDDINGS_OUTCOME: ${{ steps.suite_embeddings.outcome }}
        run: |
          python - <<'PY'
          import os

          checks = [("core", True, os.environ["CORE_OUTCOME"])]
          for prefix, name in (
              ("WRITE_FIREWALL", "write-firewall"),
              ("SYMBOL_RESOLUTION", "symbol-resolution"),
              ("MCP_CAPABILITY", "mcp-capability"),
              ("SKILL_DISCOVERY", "skill-discovery"),
              ("CASSETTE_NETWORK", "cassette-network"),
              ("EMBEDDINGS", "embeddings"),
          ):
              selected = os.environ[f"{prefix}_SELECTED"] == "true"
              outcome = os.environ[f"{prefix}_OUTCOME"]
              checks.append((name, selected, outcome))

          failures = [name for name, selected, outcome in checks if selected and outcome != "success"]
          if failures:
              raise SystemExit("selected push suites failed: " + ", ".join(failures))
          print("All selected push suites passed")
          PY

      - name: CI strict verification (SPECTRUM-05)
        env:
          CI: "true"
        run: |
          python - <<'PY'
          import json
          import hashlib
          import subprocess
          from pathlib import Path
          from cryptography.hazmat.primitives.asymmetric import ed25519
          from cryptography.hazmat.primitives import serialization

          repo_root = Path.cwd()
          run_id = "ci-strict-bundle"
          run_dir = repo_root / "LAW" / "CONTRACTS" / "_runs" / run_id
          run_dir.mkdir(parents=True, exist_ok=True)
          output_rel = "NAVIGATION/CORTEX/_generated/ci_strict_output.txt"
          output_abs = repo_root / output_rel
          output_abs.parent.mkdir(parents=True, exist_ok=True)
          output_bytes = b"ci-strict"
          output_abs.write_bytes(output_bytes)

          def canonical(obj) -> bytes:
            return json.dumps(obj, sort_keys=True, separators=(",", ":"), ensure_ascii=False).encode("utf-8")

          task_spec = {"task_id": run_id, "outputs": {"durable_paths": [output_rel]}}
          task_spec_bytes = json.dumps(task_spec, indent=2).encode("utf-8")
          (run_dir / "TASK_SPEC.json").write_bytes(task_spec_bytes)
          status = {"status": "success", "cmp01": "pass", "run_id": run_id}
          (run_dir / "STATUS.json").write_text(json.dumps(status, indent=2))
          output_hashes = {
            "validator_semver": "1.0.0",
            "validator_build_id": "ci",
            "hashes": {output_rel: "sha256:" + hashlib.sha256(output_bytes).hexdigest()},
          }
          (run_dir / "OUTPUT_HASHES.json").write_text(json.dumps(output_hashes, indent=2))
          proof = {"restoration_result": {"verified": True, "condition": "RESTORED_IDENTICAL"}}
          (run_dir / "PROOF.json").write_text(json.dumps(proof, indent=2))
          private_key = ed25519.Ed25519PrivateKey.generate()
          public_key_bytes = private_key.public_key().public_bytes(
            encoding=serialization.Encoding.Raw,
            format=serialization.PublicFormat.Raw,
          )
          public_key_hex = public_key_bytes.hex()
          validator_id = hashlib.sha256(public_key_bytes).hexdigest()
          identity = {"algorithm": "ed25519", "public_key": public_key_hex, "validator_id": validator_id}
          (run_dir / "VALIDATOR_IDENTITY.json").write_text(json.dumps(identity, indent=2))
          task_spec_hash = hashlib.sha256(task_spec_bytes).hexdigest()
          bundle_preimage = {"output_hashes": output_hashes["hashes"], "status": status, "task_spec_hash": task_spec_hash}
          bundle_root = hashlib.sha256(canonical(bundle_preimage)).hexdigest()
          signed_payload = {"bundle_root": bundle_root, "decision": "ACCEPT", "validator_id": validator_id}
          (run_dir / "SIGNED_PAYLOAD.json").write_text(json.dumps(signed_payload, indent=2))
          signature_message = b"CAT-DPT-SPECTRUM-04-v1:BUNDLE:" + canonical(signed_payload)
          signature = private_key.sign(signature_message).hex()
          sig_obj = {"payload_type": "BUNDLE", "signature": signature, "validator_id": validator_id}
          (run_dir / "SIGNATURE.json").write_text(json.dumps(sig_obj, indent=2))
          cmd = ["python", "CAPABILITY/TOOLS/catalytic/catalytic_verifier.py", "--run-dir", str(run_dir), "--strict", "--json"]
          res = subprocess.run(cmd, cwd=str(repo_root), capture_output=True, text=True)
          if res.returncode != 0:
            raise SystemExit(f"strict verifier failed: rc={res.returncode}\nstdout={res.stdout}\nstderr={res.stderr}")
          report = json.loads(res.stdout)
          if not report.get("ok"):
            raise SystemExit(f"strict verifier reported ok=false: {report}")
          PY

      - name: Run artifact escape hatch
        run: |
          python CAPABILITY/SKILLS/commit-manager/run.py CAPABILITY/SKILLS/commit-manager/fixtures/basic/input.json LAW/CONTRACTS/_runs/escape-check.json
          python CAPABILITY/SKILLS/commit-manager/validate.py LAW/CONTRACTS/_runs/escape-check.json CAPABILITY/SKILLS/commit-manager/fixtures/basic/expected.json
