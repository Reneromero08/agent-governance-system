name: Phase 6 Gate R Debug

on:
  pull_request:
    paths:
      - ".github/workflows/phase6-gate-r-debug.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Build sealed design
        working-directory: THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/l4b_orbitstate
        run: make clean all test run
      - name: Capture reviewer result
        working-directory: THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier
        run: |
          set +e
          rm -rf "$RUNNER_TEMP/gate_r_debug"
          mkdir -p "$RUNNER_TEMP/gate_r_debug"
          python gate_r/gate_r_review.py run \
            --design l4b_orbitstate/results/l4b5b0_observability_design.json \
            --addendum gate_r/L4B5B0_GATE_R_REPAIR_ADDENDUM.md \
            --review-md gate_r/L4B5B0_GATE_R_TECHNICAL_REVIEW.md \
            --findings gate_r/L4B5B0_GATE_R_FINDINGS.md \
            --phase6b5c carrier_witness_closure/theory_gate_audit/results/phase6b5c_t48_d32b1bed_20260619/analysis_manifest.json \
            --phase6b5d carrier_witness_closure/theory_gate_audit/PHASE6B5D_DETERMINISTIC_MANIFEST.json \
            --tone-order carrier_witness_closure/theory_gate_audit/PHASE6B5E_TONE_ORDER_CONTROL_CONTRACT.md \
            --output "$RUNNER_TEMP/gate_r_debug/output" \
            >"$RUNNER_TEMP/gate_r_debug/stdout.log" \
            2>"$RUNNER_TEMP/gate_r_debug/stderr.log"
          echo "$?" > "$RUNNER_TEMP/gate_r_debug/exit_code.txt"
          find "$RUNNER_TEMP/gate_r_debug" -maxdepth 3 -type f -printf '%p %s bytes\n' > "$RUNNER_TEMP/gate_r_debug/files.txt"
          exit 0
      - name: Upload debug packet
        uses: actions/upload-artifact@v4
        with:
          name: phase6-gate-r-debug-${{ github.run_id }}
          path: ${{ runner.temp }}/gate_r_debug
          if-no-files-found: error
          retention-days: 2
