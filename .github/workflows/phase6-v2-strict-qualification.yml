name: Phase 6 V2 Strict Qualification

on:
  pull_request:
    paths:
      - ".github/workflows/phase6-v2-strict-qualification.yml"
      - "THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/holo_runtime_v2/**"
      - "THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/combined_observability_campaign/v2/**"
      - "THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/10_cross_core_wormhole/slot2_pdn/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  strict-v2:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Phase 6 V2 subtree
        env:
          GH_TOKEN: ${{ github.token }}
          CHECKOUT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          auth="$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 -w0)"
          echo "::add-mask::$auth"
          git init .
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"
          git sparse-checkout init --cone
          git sparse-checkout set \
            THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/holo_runtime_v2 \
            THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/combined_observability_campaign/v2 \
            THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/10_cross_core_wormhole/slot2_pdn
          git -c http.https://github.com/.extraheader="AUTHORIZATION: basic $auth" \
            fetch --no-tags --prune --depth=1 origin "$CHECKOUT_SHA"
          git checkout --detach FETCH_HEAD
          test "$(git rev-parse HEAD)" = "$CHECKOUT_SHA"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - name: Install analysis dependency
        run: python -m pip install --disable-pip-version-check "numpy>=1.26,<3"
      - name: Compile and test V2 runtime
        working-directory: THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/holo_runtime_v2
        run: |
          gcc -std=c11 -O2 -pthread -Wall -Wextra -Werror combined_pdn_runner.c combined_pdn_hardware.c captured_file.c -o combined_pdn_runner -lm
          python -m unittest -v test_combined_pdn_runner.py test_waveform_equivalence.py test_slot2_primitive_identity.py test_captured_file.py
      - name: Test V2 contracts and analyzer
        working-directory: THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/combined_observability_campaign/v2
        run: python -m unittest -v test_calibration_contract.py test_receiver_schedule.py test_spectral_calibration_analyzer.py
      - name: Test V2 sanitizers
        working-directory: THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/holo_runtime_v2
        run: |
          gcc -std=c11 -O1 -g -pthread -Wall -Wextra -Werror -fsanitize=address -fno-omit-frame-pointer combined_pdn_runner.c combined_pdn_hardware.c captured_file.c -o combined_pdn_runner -lm
          ASAN_OPTIONS=detect_leaks=1:halt_on_error=1 python -m unittest -v test_combined_pdn_runner.py test_waveform_equivalence.py
          gcc -std=c11 -O1 -g -pthread -Wall -Wextra -Werror -fsanitize=undefined -fno-omit-frame-pointer combined_pdn_runner.c combined_pdn_hardware.c captured_file.c -o combined_pdn_runner -lm
          UBSAN_OPTIONS=halt_on_error=1:print_stacktrace=1 python -m unittest -v test_combined_pdn_runner.py test_waveform_equivalence.py
