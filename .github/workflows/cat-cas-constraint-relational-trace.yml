name: CAT_CAS Constraint Relational Trace

on:
  pull_request:
    branches: [main]
    paths:
      - 'THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/constraint_relational_trace_v1/**'
      - 'THOUGHT/LAB/CAT_CAS/tests/constraint_relational_trace/**'
      - '.github/workflows/cat-cas-constraint-relational-trace.yml'
  push:
    branches:
      - 'codex/constraint-relational-trace-proof-campaign'
    paths:
      - 'THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/constraint_relational_trace_v1/**'
      - 'THOUGHT/LAB/CAT_CAS/tests/constraint_relational_trace/**'
      - '.github/workflows/cat-cas-constraint-relational-trace.yml'

concurrency:
  group: cat-cas-constraint-relational-trace-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  qualify:
    name: Constraint Relational Trace Reference Qualification
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Install qualification dependencies
        run: python -m pip install pytest jsonschema

      - name: Run exact relational reference tests
        run: python -m pytest THOUGHT/LAB/CAT_CAS/tests/constraint_relational_trace -q

      - name: Execute reference campaign
        run: python THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/constraint_relational_trace_v1/run_reference_campaign.py

      - name: Run CAT_CAS governance critic
        shell: bash
        run: |
          set +e
          python CAPABILITY/TOOLS/governance/critic.py > /tmp/cat_cas_critic.log 2>&1
          status=$?
          grep '\[FAIL\]' /tmp/cat_cas_critic.log || true
          exit "$status"
