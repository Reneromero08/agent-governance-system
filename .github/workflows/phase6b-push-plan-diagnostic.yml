name: Phase6B Push Plan Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: phase6b-diagnostic-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  diagnose:
    if: github.head_ref == 'repair/phase6b-coherence'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install canonical dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-xdist cryptography referencing scipy sentence-transformers

      - name: Run canonical plan and post failure tail
        env:
          AGS_PUSH_BASE: ${{ github.event.pull_request.base.sha }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          TMPDIR: ${{ github.workspace }}/LAW/CONTRACTS/_runs/_tmp/pytest
          TEMP: ${{ github.workspace }}/LAW/CONTRACTS/_runs/_tmp/pytest
          TMP: ${{ github.workspace }}/LAW/CONTRACTS/_runs/_tmp/pytest
          CUDA_VISIBLE_DEVICES: ''
        shell: bash
        run: |
          mkdir -p "$TMPDIR"
          set +e
          python CAPABILITY/TOOLS/utilities/push_test_plan.py --run --workers 4 > /tmp/phase6b-push-plan.log 2>&1
          rc=$?
          set -e
          {
            echo '<!-- phase6b-push-plan-diagnostic -->'
            echo '### Phase 6B canonical push-plan diagnostic'
            echo
            echo "Exit code: \`$rc\`"
            echo
            echo '<details><summary>Failure tail</summary>'
            echo
            echo '```text'
            tail -n 180 /tmp/phase6b-push-plan.log
            echo '```'
            echo '</details>'
          } > /tmp/phase6b-comment.md
          existing=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --paginate --jq '.[] | select(.body | contains("<!-- phase6b-push-plan-diagnostic -->")) | .id' | head -1)
          if [[ -n "$existing" ]]; then
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${existing}" -F body=@/tmp/phase6b-comment.md >/dev/null
          else
            gh pr comment "$PR_NUMBER" --body-file /tmp/phase6b-comment.md
          fi
          exit "$rc"
