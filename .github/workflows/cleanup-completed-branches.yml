name: Cleanup completed branches

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-24.04
    steps:
      - name: Delete completed branches and remove this workflow
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.parse
          import urllib.request

          token = os.environ["GH_TOKEN"]
          repository = os.environ["GH_REPOSITORY"]
          sha = os.environ["GH_SHA"]
          api = "https://api.github.com"
          protected = {"main", "external_frontier"}
          completed = [
              "phase6/combined-observability-executor",
              "phase6/audit-preservation-sidecar-fix",
              "internal/pr10-source-export",
              "internal/pr10-materialized",
              "internal/phase6-audit-followup-payload",
              "chore/cleanup-completed-branches",
          ]

          def request(method: str, path: str, body: dict | None = None):
              data = None if body is None else json.dumps(body).encode("utf-8")
              req = urllib.request.Request(
                  api + path,
                  data=data,
                  method=method,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "Content-Type": "application/json",
                  },
              )
              try:
                  with urllib.request.urlopen(req) as response:
                      payload = response.read()
                      return response.status, json.loads(payload) if payload else None
              except urllib.error.HTTPError as error:
                  payload = error.read().decode("utf-8", errors="replace")
                  return error.code, payload

          for branch in completed:
              if branch in protected:
                  raise SystemExit(f"refusing to delete protected branch: {branch}")
              encoded = urllib.parse.quote(f"heads/{branch}", safe="")
              status, payload = request("GET", f"/repos/{repository}/git/ref/{encoded}")
              if status == 404:
                  print(f"SKIP missing {branch}")
                  continue
              if status != 200:
                  raise SystemExit(f"cannot inspect {branch}: HTTP {status} {payload}")
              status, payload = request("DELETE", f"/repos/{repository}/git/refs/{encoded}")
              if status != 204:
                  raise SystemExit(f"cannot delete {branch}: HTTP {status} {payload}")
              print(f"DELETED {branch}")

          workflow_path = ".github/workflows/cleanup-completed-branches.yml"
          encoded_path = urllib.parse.quote(workflow_path, safe="/")
          status, payload = request(
              "GET", f"/repos/{repository}/contents/{encoded_path}?ref=main"
          )
          if status != 200 or not isinstance(payload, dict) or not payload.get("sha"):
              raise SystemExit(f"cannot inspect cleanup workflow: HTTP {status} {payload}")
          status, payload = request(
              "DELETE",
              f"/repos/{repository}/contents/{encoded_path}",
              {
                  "message": "chore: remove completed branch cleanup workflow",
                  "sha": payload["sha"],
                  "branch": "main",
              },
          )
          if status not in {200, 201}:
              raise SystemExit(f"cannot remove cleanup workflow: HTTP {status} {payload}")
          print(f"REMOVED {workflow_path} from main after {sha}")
          PY
