name: Phase 6 Gate R Technical Review

on:
  pull_request:
    paths:
      - ".github/workflows/phase6-gate-r.yml"
      - "THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/gate_r/**"
      - "THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/holo_runtime/holo_observability_*"
      - "THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/l4b_orbitstate/**"
      - "THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/carrier_witness_closure/theory_gate_audit/PHASE6B5D_DETERMINISTIC_MANIFEST.json"
      - "THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/carrier_witness_closure/theory_gate_audit/PHASE6B5E_TONE_ORDER_CONTROL_CONTRACT.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gate-r:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build and test sealed observability design
        working-directory: THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/l4b_orbitstate
        run: |
          make clean all test
          make run
          test -f results/l4b5b0_observability_design.json
          sha256sum results/l4b5b0_observability_design.json

      - name: Run Gate R tests and authority guard
        working-directory: THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/gate_r
        run: |
          python test_gate_r_review.py
          python verify_gate_r_status.py

      - name: Generate deterministic Gate R packet twice
        working-directory: THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier
        run: |
          rm -rf "$RUNNER_TEMP/gate_r" "$RUNNER_TEMP/gate_r_repeat"
          ARGS=(
            --design l4b_orbitstate/results/l4b5b0_observability_design.json
            --addendum gate_r/L4B5B0_GATE_R_REPAIR_ADDENDUM.md
            --review-md gate_r/L4B5B0_GATE_R_TECHNICAL_REVIEW.md
            --findings gate_r/L4B5B0_GATE_R_FINDINGS.md
            --phase6b5c carrier_witness_closure/theory_gate_audit/results/phase6b5c_t48_d32b1bed_20260619/analysis_manifest.json
            --phase6b5d carrier_witness_closure/theory_gate_audit/PHASE6B5D_DETERMINISTIC_MANIFEST.json
            --tone-order carrier_witness_closure/theory_gate_audit/PHASE6B5E_TONE_ORDER_CONTROL_CONTRACT.md
          )
          python gate_r/gate_r_review.py run "${ARGS[@]}" --output "$RUNNER_TEMP/gate_r"
          python gate_r/gate_r_review.py run "${ARGS[@]}" --output "$RUNNER_TEMP/gate_r_repeat"
          diff -ru "$RUNNER_TEMP/gate_r" "$RUNNER_TEMP/gate_r_repeat"
          python gate_r/gate_r_review.py verify "$RUNNER_TEMP/gate_r"
          find "$RUNNER_TEMP/gate_r" -maxdepth 1 -type f -printf '%f %s bytes\n' | sort
          sha256sum "$RUNNER_TEMP/gate_r"/*.json

      - name: Upload Gate R packet
        uses: actions/upload-artifact@v4
        with:
          name: phase6-gate-r-${{ github.run_id }}
          path: ${{ runner.temp }}/gate_r
          if-no-files-found: error
          retention-days: 14
