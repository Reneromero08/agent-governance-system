name: Phase 6 Gate R Design Artifact

on:
  pull_request:
    paths:
      - ".github/workflows/phase6-gate-r-design-artifact.yml"
      - "THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/holo_runtime/holo_observability_*"
      - "THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/l4b_orbitstate/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  design-artifact:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Build sealed design
        working-directory: THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/l4b_orbitstate
        run: |
          make clean all test
          make run
          sha256sum results/l4b5b0_observability_design.json
      - name: Upload sealed design
        uses: actions/upload-artifact@v4
        with:
          name: phase6-gate-r-design-${{ github.run_id }}
          path: THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/l4b_orbitstate/results/l4b5b0_observability_design.json
          if-no-files-found: error
          retention-days: 7
