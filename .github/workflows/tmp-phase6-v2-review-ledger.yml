name: TEMP Phase 6 V2 Review Ledger

on:
  push:
    branches:
      - tmp/phase6-v2-review-ledger
  pull_request:
    paths:
      - ".github/workflows/tmp-phase6-v2-review-ledger.yml"
      - "tools/phase6_v2/render_review_ledger.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Decide whether rendering is needed
        id: guard
        run: |
          if git log -1 --pretty=%s | grep -Fxq 'phase6: render review ledger correction'; then
            echo 'render=false' >> "$GITHUB_OUTPUT"
          else
            echo 'render=true' >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        if: steps.guard.outputs.render == 'true'
        with:
          python-version: "3.11"
      - name: Render review ledger correction
        if: steps.guard.outputs.render == 'true'
        run: python tools/phase6_v2/render_review_ledger.py
      - name: Verify patch scope
        if: steps.guard.outputs.render == 'true'
        run: |
          git diff --check
          git diff --name-only | sort
          test "$(git diff --name-only | wc -l)" -eq 5
      - name: Commit rendered evidence files on isolated branch
        if: steps.guard.outputs.render == 'true' && github.event_name == 'push'
        run: |
          git config user.name 'phase6-review-ledger'
          git config user.email 'actions@users.noreply.github.com'
          git add \
            THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/combined_observability_campaign/v2/evidence/COMMANDS.jsonl \
            THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/combined_observability_campaign/v2/evidence/FINAL_BINDINGS.json \
            THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/combined_observability_campaign/v2/evidence/linux/qualification.log \
            THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/combined_observability_campaign/v2/evidence/EVIDENCE_INVENTORY.sha256 \
            THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/combined_observability_campaign/v2/evidence/EVIDENCE_INVENTORY_VERIFICATION.txt
          git commit -m 'phase6: render review ledger correction'
          git push origin HEAD:tmp/phase6-v2-review-ledger
