name: TEMP Phase 6 V2 Custody Hardening

on:
  push:
    branches: [tmp/phase6-v2-custody-hardening]
  pull_request:
    paths: [".github/workflows/tmp-phase6-v2-custody-hardening.yml"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: 44df394ca513fce4c433820cce2cf9795b5e4211
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - name: Download and verify validated source artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/7837226146/zip \
            -o "$RUNNER_TEMP/source.zip"
          echo "3171e3d8b869577009f5100daa4ded7062ed571f16253909e15f9b6cc68002c8  $RUNNER_TEMP/source.zip" | sha256sum -c -
          unzip -q "$RUNNER_TEMP/source.zip" -d "$RUNNER_TEMP/source-artifact"
          test "$(wc -l < "$RUNNER_TEMP/source-artifact/changed.txt")" -eq 10
          tar -xzf "$RUNNER_TEMP/source-artifact/custody-source.tgz"
          git diff --check
      - name: Reverify strict source matrix
        run: |
          python -m pip install --disable-pip-version-check "numpy>=1.26,<3"
          cd THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/holo_runtime_v2
          gcc -std=c11 -O2 -pthread -Wall -Wextra -Werror combined_pdn_runner.c combined_pdn_hardware.c captured_file.c -o combined_pdn_runner -lm
          python -m unittest -v test_combined_pdn_runner.py test_waveform_equivalence.py test_slot2_primitive_identity.py test_captured_file.py
          gcc -std=c11 -O1 -g -pthread -Wall -Wextra -Werror -fsanitize=address -fno-omit-frame-pointer combined_pdn_runner.c combined_pdn_hardware.c captured_file.c -o combined_pdn_runner -lm
          ASAN_OPTIONS=detect_leaks=1:halt_on_error=1 python -m unittest -v test_combined_pdn_runner.py test_waveform_equivalence.py
          gcc -std=c11 -O1 -g -pthread -Wall -Wextra -Werror -fsanitize=undefined -fno-omit-frame-pointer combined_pdn_runner.c combined_pdn_hardware.c captured_file.c -o combined_pdn_runner -lm
          UBSAN_OPTIONS=halt_on_error=1:print_stacktrace=1 python -m unittest -v test_combined_pdn_runner.py test_waveform_equivalence.py
      - name: Create runtime Git blobs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json, os, urllib.request
          from pathlib import Path
          paths = [line.strip() for line in (Path(os.environ["RUNNER_TEMP"]) / "source-artifact/changed.txt").read_text().splitlines()]
          paths = [p for p in paths if not p.startswith(".github/workflows/")]
          if len(paths) != 8:
              raise SystemExit(f"expected 8 runtime files, found {len(paths)}")
          url = f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/git/blobs"
          entries = []
          for path in paths:
              request = urllib.request.Request(url, data=json.dumps({"content": Path(path).read_text(), "encoding":"utf-8"}).encode(), method="POST", headers={"Authorization":f"Bearer {os.environ['GH_TOKEN']}","Accept":"application/vnd.github+json","X-GitHub-Api-Version":"2022-11-28","Content-Type":"application/json"})
              with urllib.request.urlopen(request) as response:
                  sha = json.load(response)["sha"]
              entries.append({"path":path,"mode":"100644","type":"blob","sha":sha})
          output = Path(os.environ["RUNNER_TEMP"]) / "runtime_blobs.json"
          output.write_text(json.dumps(entries, indent=2) + "\n")
          print(output.read_text())
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phase6-v2-runtime-blobs-${{ github.run_id }}
          path: ${{ runner.temp }}/runtime_blobs.json
          if-no-files-found: error
