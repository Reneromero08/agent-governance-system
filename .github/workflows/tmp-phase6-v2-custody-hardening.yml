name: TEMP Phase 6 V2 Custody Hardening

on:
  push:
    branches:
      - tmp/phase6-v2-custody-hardening
  pull_request:
    paths:
      - ".github/workflows/tmp-phase6-v2-custody-hardening.yml"
      - "tools/phase6_v2/render_custody_hardening.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - name: Install analysis dependency
        run: python -m pip install --disable-pip-version-check "numpy>=1.26,<3"
      - name: Render source hardening
        run: |
          cp tools/phase6_v2/render_custody_hardening.py "$RUNNER_TEMP/render.py"
          python - <<'PY'
          from pathlib import Path
          path = Path("${{ runner.temp }}/render.py")
          text = path.read_text()
          old = "    helper_anchor = '''static int object_member_count"
          new = "    helper_anchor = r'''static int object_member_count"
          if text.count(old) != 1:
              raise SystemExit("renderer literal-anchor patch mismatch")
          path.write_text(text.replace(old, new, 1))
          PY
          python "$RUNNER_TEMP/render.py"
      - name: Strict runtime and custody tests
        working-directory: THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/holo_runtime_v2
        run: |
          gcc -std=c11 -O2 -pthread -Wall -Wextra -Werror combined_pdn_runner.c combined_pdn_hardware.c captured_file.c -o combined_pdn_runner -lm
          python -m unittest -v test_combined_pdn_runner.py test_waveform_equivalence.py test_slot2_primitive_identity.py test_captured_file.py
      - name: V2 contracts and analysis
        run: |
          cd THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/combined_observability_campaign/v2
          python -m unittest -v test_calibration_contract.py test_receiver_schedule.py test_spectral_calibration_analyzer.py
          cd ../analysis
          python -m unittest -v test_waveform_reference.py test_frozen_artifact_binding.py
      - name: ASan runtime
        working-directory: THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/holo_runtime_v2
        run: |
          gcc -std=c11 -O1 -g -pthread -Wall -Wextra -Werror -fsanitize=address -fno-omit-frame-pointer combined_pdn_runner.c combined_pdn_hardware.c captured_file.c -o combined_pdn_runner -lm
          ASAN_OPTIONS=detect_leaks=1:halt_on_error=1 python -m unittest -v test_combined_pdn_runner.py test_waveform_equivalence.py
      - name: UBSan runtime
        working-directory: THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/holo_runtime_v2
        run: |
          gcc -std=c11 -O1 -g -pthread -Wall -Wextra -Werror -fsanitize=undefined -fno-omit-frame-pointer combined_pdn_runner.c combined_pdn_hardware.c captured_file.c -o combined_pdn_runner -lm
          UBSAN_OPTIONS=halt_on_error=1:print_stacktrace=1 python -m unittest -v test_combined_pdn_runner.py test_waveform_equivalence.py
      - name: Verify exact source scope
        run: |
          rm -f \
            THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/holo_runtime_v2/combined_pdn_runner \
            THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/holo_runtime_v2/waveform_fixture
          git diff --check
          { git diff --name-only; git ls-files --others --exclude-standard; } | sort -u > "$RUNNER_TEMP/changed.txt"
          cat "$RUNNER_TEMP/changed.txt"
          test "$(wc -l < "$RUNNER_TEMP/changed.txt")" -eq 10
          ! grep -E '/contracts/|/evidence/' "$RUNNER_TEMP/changed.txt"
      - name: Create runtime Git blobs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json, os, urllib.request
          from pathlib import Path

          paths = [
              "THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/holo_runtime_v2/Makefile",
              "THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/holo_runtime_v2/captured_file.c",
              "THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/holo_runtime_v2/captured_file.h",
              "THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/holo_runtime_v2/captured_file_fixture.c",
              "THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/holo_runtime_v2/combined_pdn_hardware.c",
              "THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/holo_runtime_v2/combined_pdn_runner.c",
              "THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/holo_runtime_v2/test_captured_file.py",
              "THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/holo_runtime_v2/test_combined_pdn_runner.py",
          ]
          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          url = f"https://api.github.com/repos/{repo}/git/blobs"
          entries = []
          for path in paths:
              payload = json.dumps({
                  "content": Path(path).read_text(encoding="utf-8"),
                  "encoding": "utf-8",
              }).encode()
              request = urllib.request.Request(
                  url,
                  data=payload,
                  method="POST",
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "Content-Type": "application/json",
                  },
              )
              with urllib.request.urlopen(request) as response:
                  result = json.load(response)
              entries.append({"path": path, "mode": "100644", "type": "blob", "sha": result["sha"]})
          output = Path(os.environ["RUNNER_TEMP"]) / "runtime_blobs.json"
          output.write_text(json.dumps(entries, indent=2) + "\n", encoding="utf-8")
          print(output.read_text())
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phase6-v2-runtime-blobs-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/runtime_blobs.json
            ${{ runner.temp }}/changed.txt
          if-no-files-found: error
