name: Cleanup Phase 6 authorization branches

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened]

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-24.04
    steps:
      - name: Delete completed branches and remove workflow
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.parse
          import urllib.request

          token = os.environ["GH_TOKEN"]
          repository = os.environ["GH_REPOSITORY"]
          protected = {"main", "external_frontier"}
          completed = [
              "phase6/authorize-frozen-acquisition",
              "chore/cleanup-phase6-authorization-branch",
              "chore/trigger-phase6-authorization-cleanup",
          ]

          def request(method, path, body=None):
              data = None if body is None else json.dumps(body).encode("utf-8")
              req = urllib.request.Request(
                  "https://api.github.com" + path,
                  data=data,
                  method=method,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "Content-Type": "application/json",
                  },
              )
              try:
                  with urllib.request.urlopen(req) as response:
                      payload = response.read()
                      return response.status, json.loads(payload) if payload else None
              except urllib.error.HTTPError as error:
                  return error.code, error.read().decode("utf-8", errors="replace")

          for branch in completed:
              if branch in protected:
                  raise SystemExit(f"refusing protected branch: {branch}")
              encoded = urllib.parse.quote(f"heads/{branch}", safe="")
              status, payload = request("GET", f"/repos/{repository}/git/ref/{encoded}")
              if status == 404:
                  print(f"SKIP missing {branch}")
                  continue
              if status != 200:
                  raise SystemExit(f"cannot inspect {branch}: HTTP {status} {payload}")
              status, payload = request("DELETE", f"/repos/{repository}/git/refs/{encoded}")
              if status != 204:
                  raise SystemExit(f"cannot delete {branch}: HTTP {status} {payload}")
              print(f"DELETED {branch}")

          workflow = ".github/workflows/cleanup-phase6-authorization-branch.yml"
          encoded = urllib.parse.quote(workflow, safe="/")
          status, payload = request("GET", f"/repos/{repository}/contents/{encoded}?ref=main")
          if status != 200 or not isinstance(payload, dict) or not payload.get("sha"):
              raise SystemExit(f"cannot inspect workflow: HTTP {status} {payload}")
          status, payload = request(
              "DELETE",
              f"/repos/{repository}/contents/{encoded}",
              {
                  "message": "chore: remove Phase 6 authorization cleanup workflow",
                  "sha": payload["sha"],
                  "branch": "main",
              },
          )
          if status not in {200, 201}:
              raise SystemExit(f"cannot remove workflow: HTTP {status} {payload}")
          print("CLEANUP_COMPLETE")
          PY
