name: Phase 6B.6 Software Entry

on:
  pull_request:
    paths:
      - ".github/workflows/phase6b6-software-entry.yml"
      - "THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/phase6b6/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  software-entry:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/phase6b6
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Phase 6B.6 focused tests
        run: python -m unittest discover -s tests -v
      - name: Deterministic temp-tree schedule comparison
        run: |
          set -euo pipefail
          left="$(mktemp -d)"
          right="$(mktemp -d)"
          python -m contracts.schedule --out "$left/schedule.json"
          python -m contracts.schedule --out "$right/schedule.json"
          cmp "$left/schedule.json" "$right/schedule.json"
      - name: Runtime validate-only and mock custody
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          python -m runtime.explicit_slot_runtime --validate-only --schedule-out "$tmp/schedule.json"
          python -m runtime.explicit_slot_runtime --mock-hardware --custody-out "$tmp/custody.json"
      - name: Authority fail-closed
        run: |
          set +e
          python -m runtime.explicit_slot_runtime --hardware >hardware.out 2>hardware.err
          rc=$?
          set -e
          test "$rc" -ne 0
          grep -q SOFTWARE_ENTRY_ONLY_AUTHORITY hardware.err
      - name: Strict C compile not applicable
        run: |
          if find . -name '*.c' -print -quit | grep -q .; then
            echo "unexpected C source under phase6b6 software-entry package"
            exit 1
          fi
          echo "PHASE6B6_STRICT_C_COMPILE_NA_NO_C_SOURCES"
      - name: ASan and UBSan not applicable
        run: |
          if find . -name '*.c' -print -quit | grep -q .; then
            echo "unexpected C source under phase6b6 software-entry package"
            exit 1
          fi
          echo "PHASE6B6_ASAN_UBSAN_NA_NO_C_SOURCES"
