name: TEMP Phase 6 V2 Authority Render

on:
  push:
    branches:
      - tmp/phase6-v2-authority-render
  pull_request:
    paths:
      - ".github/workflows/tmp-phase6-v2-authority-render.yml"
      - "tools/phase6_v2/render_final_authority.py"
      - "tools/phase6_v2/render_final_authority_clean.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  render:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - name: Render final authority state
        run: |
          set +e
          python tools/phase6_v2/render_final_authority_clean.py > "$RUNNER_TEMP/render.log" 2>&1
          rc=$?
          cat "$RUNNER_TEMP/render.log"
          exit "$rc"
      - name: Verify patch scope
        run: |
          git diff --check
          git diff --name-only | sort
          test "$(git diff --name-only | wc -l)" -eq 8
      - name: Package rendered authority files
        run: |
          tar -czf "$RUNNER_TEMP/phase6-v2-authority-render.tgz" \
            THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/PHASE6_ROADMAP.md \
            THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/PHASE6_NAVIGATION.md \
            THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/CHIRAL_LANE_NONCOLLAPSE_ROADMAP.md \
            THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/combined_observability_campaign/V2_FINAL_QUALIFICATION_WORK_PACKAGE.md \
            THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/combined_observability_campaign/v2/ARCHITECTURE_REVIEW.md \
            THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/combined_observability_campaign/v2/evidence/FINAL_BINDINGS.json \
            THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/combined_observability_campaign/v2/evidence/EVIDENCE_INVENTORY.sha256 \
            THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/combined_observability_campaign/v2/evidence/EVIDENCE_INVENTORY_VERIFICATION.txt
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: phase6-v2-authority-render-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/render.log
            ${{ runner.temp }}/phase6-v2-authority-render.tgz
            ${{ runner.temp }}/phase6_v2_authority_manifest.json
          if-no-files-found: warn
