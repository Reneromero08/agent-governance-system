name: Phase 6 Audit Follow-up Materialization

on:
  push:
    branches:
      - phase6/audit-preservation-sidecar-fix

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-24.04
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - name: Reconstruct verified follow-up payload
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin internal/phase6-audit-followup-payload
          : > "$RUNNER_TEMP/payload.b64"
          for part in $(git ls-tree -r --name-only origin/internal/phase6-audit-followup-payload -- .phase6-followup | sort); do
            git show "origin/internal/phase6-audit-followup-payload:${part}" >> "$RUNNER_TEMP/payload.b64"
          done
          echo 'fdb0444c5c1ea62f5372c04193c56f0215f2fdc8581e7bfc742285c6cf27a2f8  '"$RUNNER_TEMP/payload.b64" | sha256sum -c -
          base64 -d "$RUNNER_TEMP/payload.b64" > "$RUNNER_TEMP/payload.tgz"
          echo '5bfd3d6ba43e1bb5b9191b924cbf94f7b8615b11e82a9a6653ce86411da78113  '"$RUNNER_TEMP/payload.tgz" | sha256sum -c -
      - name: Materialize one architectural commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "CAT_CAS Audit Follow-up"
          git config user.email "reneromero08+catcas-audit@users.noreply.github.com"
          git checkout --detach de999f234ee9556b4c44467e90fb297b0589ec19
          tar -xzf "$RUNNER_TEMP/payload.tgz"
          git add \
            THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/combined_observability_campaign/make_executor_source_bundle.py \
            THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/combined_observability_campaign/test_executor_source_bundle.py \
            THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/holo_runtime/README.md \
            THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/combined_observability_campaign/audits/PR10_TARGET_EVIDENCE_AUDIT.md \
            THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/combined_observability_campaign/audits/PR10_TARGET_EVIDENCE_AUDIT.json
          git diff --cached --check
          test "$(git diff --cached --name-only | wc -l)" -eq 5
          campaign='THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/combined_observability_campaign'
          (
            cd "$campaign"
            python -m py_compile *.py
            python -m unittest discover -v -p 'test_*.py'
          )
          git commit -m 'fix(phase6): preserve audit and correct checksum sidecar'
          git rev-parse HEAD > "$RUNNER_TEMP/final_sha.txt"
          test "$(git rev-parse HEAD^)" = 'de999f234ee9556b4c44467e90fb297b0589ec19'
      - name: Publish materialized branch
        shell: bash
        run: |
          set -euo pipefail
          final_sha="$(cat "$RUNNER_TEMP/final_sha.txt")"
          git push --force origin "$final_sha:refs/heads/phase6/audit-preservation-sidecar-fix"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phase6-audit-followup-${{ github.run_id }}
          path: ${{ runner.temp }}/final_sha.txt
          if-no-files-found: error
          retention-days: 1
