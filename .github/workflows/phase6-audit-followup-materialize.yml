name: Phase 6 Audit Follow-up Candidate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  candidate:
    runs-on: ubuntu-24.04
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - name: Reconstruct payload
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin internal/phase6-audit-followup-payload
          : > "$RUNNER_TEMP/payload.b64"
          for part in $(git ls-tree -r --name-only origin/internal/phase6-audit-followup-payload -- .phase6-followup | sort); do
            git show "origin/internal/phase6-audit-followup-payload:${part}" >> "$RUNNER_TEMP/payload.b64"
          done
          echo 'a56070e71db6ae08e3629e205bf7ff8f1df71ed3eeccb515e1b7ab745bbd1f4f  '"$RUNNER_TEMP/payload.b64" | sha256sum -c -
          base64 -d "$RUNNER_TEMP/payload.b64" > "$RUNNER_TEMP/payload.tgz"
          echo 'd858b89b2145681ca0daf69c4a7512fc1270c16529216cb425770995afd2decc  '"$RUNNER_TEMP/payload.tgz" | sha256sum -c -
      - name: Build and verify candidate
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "CAT_CAS Audit Follow-up"
          git config user.email "reneromero08+catcas-audit@users.noreply.github.com"
          git checkout --detach de999f234ee9556b4c44467e90fb297b0589ec19
          tar -xzf "$RUNNER_TEMP/payload.tgz"
          git add -A THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/combined_observability_campaign THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/holo_runtime/README.md
          git diff --cached --check
          cd THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/combined_observability_campaign
          python -m unittest discover -v -p 'test_*.py'
          cd "$GITHUB_WORKSPACE"
          git commit -m 'fix(phase6): preserve audit and correct checksum sidecar'
          git rev-parse HEAD > "$RUNNER_TEMP/final_sha.txt"
          test "$(git rev-parse HEAD^)" = 'de999f234ee9556b4c44467e90fb297b0589ec19'
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phase6-audit-followup-${{ github.run_id }}
          path: ${{ runner.temp }}/final_sha.txt
          if-no-files-found: error
          retention-days: 1
