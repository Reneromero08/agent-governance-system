name: Phase 6 Audit Follow-up Finalize

on:
  push:
    branches: [phase6/audit-preservation-sidecar-fix]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-24.04
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - name: Apply exact sidecar repair
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/combined_observability_campaign/make_executor_source_bundle.py")
          text = path.read_text(encoding="utf-8")

          anchor = '''def sha256_file(path: Path) -> str:
              digest = hashlib.sha256()
              with path.open("rb") as handle:
                  for chunk in iter(lambda: handle.read(1024 * 1024), b""):
                      digest.update(chunk)
              return digest.hexdigest()
          '''
          helpers = anchor + '''

          def write_sha256_sidecar(path: Path, sidecar: Path) -> None:
              sidecar.write_text(f"{sha256_file(path)}  {path.name}\\n", encoding="utf-8")


          def verify_sha256_sidecar(sidecar: Path, expected_path: Path) -> None:
              tokens = sidecar.read_text(encoding="utf-8").strip().split(maxsplit=1)
              if len(tokens) != 2:
                  raise RuntimeError(f"invalid checksum sidecar: {sidecar.name}")
              digest, recorded_name = tokens
              recorded_name = recorded_name.lstrip("*")
              if recorded_name != expected_path.name:
                  raise RuntimeError(
                      f"checksum sidecar filename mismatch: {sidecar.name} names {recorded_name}, "
                      f"expected {expected_path.name}"
                  )
              if digest != sha256_file(expected_path):
                  raise RuntimeError(f"checksum sidecar digest mismatch: {sidecar.name}")


          def rename_bundle_with_sidecar(
              root: Path, old_name: str, new_name: str
          ) -> tuple[Path, Path]:
              old_path = root / old_name
              old_sidecar = root / f"{Path(old_name).stem}.sha256"
              new_path = root / new_name
              new_sidecar = root / f"{Path(new_name).stem}.sha256"
              old_path.rename(new_path)
              old_sidecar.rename(new_sidecar)
              write_sha256_sidecar(new_path, new_sidecar)
              verify_sha256_sidecar(new_sidecar, new_path)
              return new_path, new_sidecar
          '''
          if text.count(anchor) != 1:
              raise SystemExit("sha256 helper anchor mismatch")
          text = text.replace(anchor, helpers, 1)

          old_verify = '''    checksum_tokens = checksum_path.read_text(encoding="utf-8").split()
              if not checksum_tokens or sha256_file(bundle_path) != checksum_tokens[0]:
                  raise RuntimeError("source_bundle.sha256 mismatch")
          '''
          new_verify = '''    verify_sha256_sidecar(checksum_path, bundle_path)
          '''
          if text.count(old_verify) != 1:
              raise SystemExit("verify_bundle anchor mismatch")
          text = text.replace(old_verify, new_verify, 1)

          old_write = '''    (output / "source_bundle.sha256").write_text(
                  sha256_file(bundle_path) + "  source_bundle.json\\n", encoding="utf-8"
              )
          '''
          new_write = '''    write_sha256_sidecar(bundle_path, output / "source_bundle.sha256")
          '''
          if text.count(old_write) != 2:
              raise SystemExit(f"source sidecar anchor count mismatch: {text.count(old_write)}")
          text = text.replace(old_write, new_write)

          old_rename = '''    (output / "source_bundle.json").rename(output / "source_transfer_bundle.json")
              (output / "source_bundle.sha256").rename(output / "source_transfer_bundle.sha256")
          '''
          new_rename = '''    rename_bundle_with_sidecar(
                  output, "source_bundle.json", "source_transfer_bundle.json"
              )
          '''
          if text.count(old_rename) != 1:
              raise SystemExit("rename anchor mismatch")
          text = text.replace(old_rename, new_rename, 1)
          path.write_text(text, encoding="utf-8")
          PY
      - name: Verify and publish final branch
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/phase6-audit-followup-materialize.yml
          git config user.name "CAT_CAS Audit Follow-up"
          git config user.email "reneromero08+catcas-audit@users.noreply.github.com"
          git add -A
          git diff --cached --check
          cd THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/combined_observability_campaign
          python -m unittest discover -v -p 'test_*.py'
          cd "$GITHUB_WORKSPACE"
          git commit -m 'fix(phase6): finalize audit preservation and sidecar repair'
          git push origin HEAD:phase6/audit-preservation-sidecar-fix
