name: Phase 6 Sidecar Shape Diagnostic

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Inspect live source shape
        shell: bash
        run: |
          python - <<'PY' > "$RUNNER_TEMP/shape.txt" 2>&1
          from pathlib import Path
          path = Path("THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/combined_observability_campaign/make_executor_source_bundle.py")
          lines = path.read_text(encoding="utf-8").splitlines()
          print("helper_defs", sum(line.startswith("def write_sha256_sidecar(") for line in lines))
          print("load_defs", sum(line.startswith("def load_object(") for line in lines))
          print("checksum_tokens", sum(line.strip().startswith("checksum_tokens = checksum_path.read_text") for line in lines))
          print("sidecar_writes", sum(line.strip() == '(output / "source_bundle.sha256").write_text(' for line in lines))
          print("manifest_renames", sum(line.strip() == '(output / "source_bundle.json").rename(output / "source_transfer_bundle.json")' for line in lines))
          print("sidecar_renames", sum(line.strip() == '(output / "source_bundle.sha256").rename(output / "source_transfer_bundle.sha256")' for line in lines))
          PY
          cat "$RUNNER_TEMP/shape.txt"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phase6-sidecar-shape-${{ github.run_id }}
          path: ${{ runner.temp }}/shape.txt
          if-no-files-found: error
          retention-days: 1
