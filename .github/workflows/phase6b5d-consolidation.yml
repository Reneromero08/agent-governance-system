name: Phase 6B.5D Consolidation

on:
  pull_request:
    paths:
      - ".github/workflows/phase6b5d-consolidation.yml"
      - "THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/carrier_witness_closure/theory_gate_audit/analyze_carrier_consolidation.py"
      - "THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/carrier_witness_closure/theory_gate_audit/test_carrier_consolidation.py"
      - "THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/carrier_witness_closure/theory_gate_audit/results/phase6b5c_t48_d32b1bed_20260619/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  consolidate:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install numerical dependency
        run: python -m pip install --disable-pip-version-check numpy

      - name: Run consolidation tests
        working-directory: THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/carrier_witness_closure
        run: python theory_gate_audit/test_carrier_consolidation.py

      - name: Generate bounded consolidation packet
        working-directory: THOUGHT/LAB/CAT_CAS/7_decoder/50_phase_bm_cpu/50_6_fixed_point_substrate/14_noncollapse_frontier/carrier_witness_closure
        run: |
          rm -rf "$RUNNER_TEMP/phase6b5d"
          python theory_gate_audit/analyze_carrier_consolidation.py run \
            theory_gate_audit/results/phase6b5c_t48_d32b1bed_20260619 \
            --output "$RUNNER_TEMP/phase6b5d"
          python theory_gate_audit/analyze_carrier_consolidation.py verify \
            "$RUNNER_TEMP/phase6b5d"
          find "$RUNNER_TEMP/phase6b5d" -maxdepth 1 -type f \
            -printf '%f %s bytes\n' | sort
          sha256sum "$RUNNER_TEMP/phase6b5d"/*.json

      - name: Upload Phase 6B.5D packet
        uses: actions/upload-artifact@v4
        with:
          name: phase6b5d-consolidation-${{ github.run_id }}
          path: ${{ runner.temp }}/phase6b5d
          if-no-files-found: error
          retention-days: 7
