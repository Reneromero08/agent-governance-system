[pytest]
testpaths = CAPABILITY/TESTBENCH
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -q --tb=short
markers =
    integration: Tests requiring external resources (cassettes, embeddings)
    slow: Tests taking more than 10 seconds
    requires_cassettes: Tests requiring NAVIGATION/CORTEX/cassettes
